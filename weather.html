<html>
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
			rel="stylesheet"
		/>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Weather</title>
		<link rel="stylesheet" href="weather.css" />
	</head>

	<body>
		<div class="main-container">
			<div class="header">
				<input type="text" class="search-bar" placeholder="Search city..." />
				<button class="search-btn" aria-label="Search">
					<img src="images/search.png" alt="" class="search-icon" />
				</button>
			</div>

			<div class="error-msg" id="error-msg"></div>

			<div class="weather-content">
				<div class="icon">
					<img src="images/clear.png" alt="Weather icon" />
				</div>

				<h1 class="temp">22°C</h1>
				<div class="city">New York</div>
				<div class="description">Clear Sky</div>

				<div class="divider"></div>

				<div class="footer">
					<div class="stat-card">
						<img src="images/humidity.png" alt="" class="stat-icon" />
						<div class="stat-info">
							<span class="humidity stat-value">50%</span>
							<span class="stat-label">Humidity</span>
						</div>
					</div>
					<div class="stat-card">
						<img src="images/wind.png" alt="" class="stat-icon" />
						<div class="stat-info">
							<span class="wind stat-value">15 km/h</span>
							<span class="stat-label">Wind Speed</span>
						</div>
					</div>
				</div>
			</div>
		</div>
		<script src="weather.js"></script>
	</body>
</html>
