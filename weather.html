<html>
	<head>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
			rel="stylesheet"
		/>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Weather Information</title>
		<link rel="stylesheet" href="weather.css" />
		
	</head>

	<body>
		<div class="main-container">
			<div class="header">
				<input type="text" class="search-bar" placeholder="Enter city name" />
				<button>
					<img src="images/search.png" alt="" class="search" />
				</button>
			</div>

			<div class="icon">
				<img src="images/clear.png" alt="" />
			</div>
			<div class="temperature">
				<h1 class="temp">22°C</h1>
			</div>
			<div class="city">New York</div>

			<div class="footer">
				<img src="images/humidity.png" alt="" class="icons" />

				<div class="text">
					<h2 class="humidity">50%</h2>
					<h3>Humidity</h3>
				</div>

				<img src="images/wind.png" alt="" class="icons" />

				<div class="text">
					<h2 class="wind">15 km/h</h2>
					<h3>Wind Speed</h3>
				</div>
			</div>
		</div>
		<script src="weather.js"></script>
	</body>
</html>;
